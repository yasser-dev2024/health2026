services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: helth2026
      POSTGRES_USER: helth2026
      POSTGRES_PASSWORD: helth2026
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U helth2026 -d helth2026"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    environment:
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,0.0.0.0"
      DB_ENGINE: django.db.backends.postgresql
      POSTGRES_DB: helth2026
      POSTGRES_USER: helth2026
      POSTGRES_PASSWORD: helth2026
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
