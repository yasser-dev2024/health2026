<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>صيف وصحة - مساعد</title>
    <script>
      // SPA redirect for GitHub Pages:
      // Store the intended URL then redirect to the root SPA.
      // App.tsx will read it back and restore the path.
      var dest = window.location.href;
      sessionStorage.setItem('spa-404-redirect', dest);
      // Redirect to project root (keeps /asir_maaeed/ base)
      var base = window.location.pathname.split('/').slice(0, 2).join('/');
      window.location.replace(base + '/');
    </script>
  </head>
  <body></body>
</html>
